lans, allocate resources appropriately, and monitor implementation to ensure timely completion of assigned tasks. \u003c/p\u003e\u003cp\u003e•\tEvaluate the effectiveness of programs and propose adjustments to improve efficiency and quality of newly automated/digitized processes. \u003c/p\u003e\u003cp\u003e•\tPrepare instructional materials and deliver training for employees on new processes/initiatives and operating methods. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Research emerging technology trends:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tExplore the latest technologies and trends for application in improving operational processes; stay updated on banking-related knowledge. \u003c/p\u003e\u003cp\u003e•\tDevelop documentation and conduct training sessions for team members on tools and emerging technologies to optimize operational processes. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Assess and improve operational service quality:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tAnalyze feedback data from internal and external customers to identify bottlenecks and improvement opportunities. \u003c/p\u003e\u003cp\u003e•\tEstablish and monitor service quality indicators (Service Quality KPIs). \u003c/p\u003e\u003cp\u003e•\tRecommend and implement improvement solutions to enhance user experience and operational efficiency. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Standardize and optimize processes:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tReview and standardize existing operational processes to simplify, reduce errors, and improve performance. \u003c/p\u003e\u003cp\u003e•\tApply quality management methodologies such as Lean, Six Sigma, Kaizen, where appropriate. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Participate in strategic operational improvement projects:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tAct as the focal point or subject matter expert in large-scale improvement projects within the Operations Division. \u003c/p\u003e\u003cp\u003e•\tEnsure improvement projects are implemented on schedule and achieve the set objectives. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Training and internal communication:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tOrganize training programs and internal communication initiatives to raise awareness and enhance quality improvement capabilities across operational units. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7. Monitor and report improvement results:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tEstablish mechanisms to measure improvement effectiveness. \u003c/p\u003e\u003cp\u003e•\tProvide periodic reports on improvement outcomes to management and propose next steps. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e8. Perform other assigned tasks:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCarry out additional duties as directed by management or as required by projects. \u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T6d1,\u003cp\u003e\u003cstrong\u003eSUCCESS PROFILE\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Education \u0026 Experience\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tEducation:\u003c/strong\u003e Bachelor's degree in Finance, Banking, Business Administration, or Technology. Project management certifications such as PMP, Agile, Lean, or Six Sigma are a plus. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tProfessional Experience:\u003c/strong\u003e * Over 10 years of experience implementing initiatives/projects related to automation. \u003c/p\u003e\u003cp\u003eo\tExperience in process design. \u003c/p\u003e\u003cp\u003eo\tProven track record in managing complex projects in banking, technology, retail, or start-up environments. \u003c/p\u003e\u003cp\u003eo\tIn-depth knowledge and experience with banking systems, especially Core Banking, E-Banking, Treasury, Data Warehouse, Payments, etc. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Skills\u003c/strong\u003e\u
