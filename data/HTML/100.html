nges on Vietnamese people's daily lives by leveraging the advantages of technological sophistication. \r\nTo us, the value of work creates strong motivation for continuous learning, remarkable innovation and outcomes-driven spirit.\r\n\r\nOUR LIFE: The inspiring purpose and fast-pace of work quickly makes One Mount become a second home for talents across the globe. The variance in age, gender, regions and perspectives shaped  the cultural diversity, fosters team creativity, and increases employee engagement. \r\nOne Mount chooses to promote the \"Success Culture\" with 5 core values probably stated as Result-driven, Breakthrough perspectives, Business mindset, Collaboration and Efficiency in the journey of creating values for all.24:Tfbb,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eJob Purpose:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tResponsible for the overall strategy, design, governance, and management of the company's technology service delivery ecosystem for both internal stakeholders and enterprise customers.\u003c/p\u003e\u003cp\u003e•\tThe primary objective of this role is to transform and operate the service organization through standardized frameworks (ITIL/ISO), streamlined processes, and high quality service commitments (SLA/XLA). The role is also expected to lead the adoption of automation and Artificial Intelligence (AI) across the service lifecycle, driving operational efficiency, cost optimization, and enhanced customer experience.\u003c/p\u003e\u003cp\u003eKey Accountabilities\u003c/p\u003e\u003cp\u003eStrategic Leadership \u0026 Service Transformation\u003c/p\u003e\u003cp\u003e•\tDevelop and drive the long-term strategy and roadmap for the Enterprise Technology Services organization, ensuring alignment with the company's overall business objectives and growth plans.\u003c/p\u003e\u003cp\u003e•\tLead the adoption of Artificial Intelligence (AI) and automation initiatives across the service landscape. Identify, evaluate, and implement AI-driven solutions (e.g., AIOps, GenAI-powered virtual assistants, auto-remediation, predictive analytics) to automate incident resolution, proactively identify and mitigate system risks, and reduce manual operational efforts.\u003c/p\u003e\u003cp\u003e•\tEstablish and continuously enhance a standardized service management operating model aligned with international best practices and frameworks, including ITIL v4, ISO 20000, ISO 27001, and other relevant industry standards.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOperational Excellence \u0026 Service Delivery Management\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tOversee end-to-end service request and incident management processes, continuously improving First Contact Resolution (FCR) rates and overall service efficiency.\u003c/p\u003e\u003cp\u003e•\tEnsure the continuous availability and effectiveness of infrastructure and cybersecurity monitoring capabilities. Leverage AI-driven technologies to enable proactive anomaly detection, intelligent root cause analysis, and automated incident response.\u003c/p\u003e\u003cp\u003e•\tManage the full lifecycle of IT assets, enterprise infrastructure deployment, and service operations while driving continuous optimization of system performance, reliability, and scalability for enterprise customers.\u003c/p\u003e\u003cp\u003e•\tEstablish, monitor, and maintain accountability for key operational performance indicators (KPIs), service delivery metrics, and contractual Service Level Agreements (SLAs).\u003c/p\u003e\u003cp\u003e•\tDrive the evolution from traditional SLA-based service management toward Experience Level Agreements (XLAs), with a strong focus on end-user satisfaction, service adoption, and overall customer experience.\u003c/p\u003e\u003cp\u003e•\tLead the coordination and resolution of Major Incidents, serving as the primary escalation point for critical service disruptions and engaging directly with strategic customers and executive stakeholders during high-impact situations.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTalent Management \u0026 Organizational Development\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tDesign and maintain a high-performing, lean organizational structure, optimizing workforce capacity through technology enablement, automation, and process efficiency rather than traditional headcount growth.\u003c/p\u003e\u003cp\u003e•\tLead workforce planning and capability development initiatives to ensure the organization possesses the skills and expertise required to support evolving business and technology demands.\u003c/p\u003e\u003cp\u003e•\tCoach, mentor, and develop Team Leads and Managers, strengthening leadership capabilities, succession pipelines, and overall organizational effectiveness.\u003c/p\u003e\u003cp\u003e•\tFoster a culture of continuous improvement, innovation, and operational excellence, encouraging teams to challenge conventional approaches and embrace new technologies.\u003c/p\u003e\u003cp\u003e•\tChampion an Automation-First mindset across the organization, driving the adoption of automation, AI-enabled solutions, and data-driven decision-making to improve productivity, service quality, and employee experience.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T11f6,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eQualifications \u0026 Requirements\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEducation \u0026 Professional Certifications\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tBachelor's degree or higher in Information Technology, Computer Science, Management Information Systems (MIS), Engineering, or a related discipline.\u003c/p\u003e\u003cp\u003e•\tRelevant industry certifications are highly preferred, including but not limited to ITIL
