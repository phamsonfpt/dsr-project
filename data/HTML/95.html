t is our portfolio of initiatives focused on making a tangible impact on society’s biggest challenges and creating a better future. We strive to advise clients on how to deliver purpose-led growth and embed more equitable, inclusive as well as sustainable business practices.\u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003eHence, we seek talented individuals driven to excel and innovate, working together to achieve our shared goals.\u003c/p\u003e\u003cp\u003eWe are committed to creating positive work experiences that foster a culture of respect and inclusion, where diverse perspectives are celebrated, and everyone is recognized for their contributions.\u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003eReady to unleash your potential with us? Join the winning team now!\u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWork you will do\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003eThis role sits within the SAP team of Deloitte Southeast Asia, which encompasses the SAP Module solutions respectively. As a leader of this group, you will drive the growth of our SAP business in the region and be responsible for the creation, sale and delivery of SAP solutions: Functional and Technical Design, SAP Application \u0026 Systems Development, SAP Business Transformation, etc.\u003c/p\u003e\u003cp\u003e•\tEngage clients in workshops and interviews to analyze process and reporting requirements\u003c/p\u003e\u003cp\u003e•\tAdvise clients on industry/ cross-industry leading practices. Advise clients on SAP recommended processes and functions\u003c/p\u003e\u003cp\u003e•\tDesign target state SAP solutions for clients. Influence clients’ thinking in adopting leading/ standard practices while developing target state\u003c/p\u003e\u003cp\u003e•\tAnalyze application landscape to design interfaces to SAP solution\u003c/p\u003e\u003cp\u003e•\tPerform SAP configuration and tests. Develop specifications for development of forms/ reports/ interfaces.\u003c/p\u003e\u003cp\u003e•\tLead the consultant and client teams through the implementation cycle including planning and execution of testing, migration and cutover.\u003c/p\u003e\u003cp\u003e•\tSupport change management execution by developing training material, delivering training and supporting users post cutover.\u003c/p\u003e\u003cp\u003e•\tDevelop relationships with internal and external stakeholders\u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eYour role as a leader:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003eAt Deloitte, we believe in the importance of empowering our people to be leaders at all levels. We connect our purpose and shared values to identify issues as well as to make an impact that matters to our clients, people and the communities. Additionally, Senior Consultants across our Firm are expected to:\u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003e•\tActively seek out developmental opportunities for growth, act as strong brand ambassadors for the firm as well as share their knowledge and experience with others.\u003c/p\u003e\u003cp\u003e•\tRespect the needs of their colleagues and build up cooperative relationships.\u003c/p\u003e\u003cp\u003e•\tUnderstand the goals of our internal and external stakeholder to set personal priorities as well as align their teams’ work to achieve the objectives.\u003c/p\u003e\u003cp\u003e•\tConstantly challenge themselves, collaborate with others to deliver on tasks and take accountability for the results.\u003c/p\u003e\u003cp\u003e•\tBuild productive relationships and communicate effectively in order to positively influence teams and other stakeholders.\u003c/p\u003e\u003cp\u003e•\tOffer insights based on a solid understanding of what makes Deloitte successful.\u003c/p\u003e\u003cp\u003e•\tProject integrity and confidence while motivating others through team collaboration as well as recognising individual strengths, differences, and contribu \tRespect the needs of their colleagues and build up cooperative relationships.\u003c/p\u003e\u003cp\u003e•\tUnderstand the goals of our internal and external stakeholder to set personal priorities as well as align their teams’ work to achieve the objectives.\u003c/p\u003e\u003cp\u003e•\tConstantly challenge themselves, collaborate with others to deliver on tasks and take accountability for the results.\u003c/p\u003e\u003cp\u003e•\tBuild productive relationships and communicate effectively in order to positively influence teams and other stakeholders.\u003c/p\u003e\u003cp\u003e•\tOffer insights based on a solid understanding of what makes Deloitte successful.\u003c/p\u003e\u003cp\u003e•\tProject integrity and confidence while motivating others through team collaboration as well as recognising individual strengths, differences, and contributions.\u003c/p\u003e\u003cp\u003e•\tUnderstand disruptive trends and promote potential opportunities for improvement.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"28:T701,\u003cp\u003e\u003cstrong\u003eRequirements:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003e•\tA good honors Degree, preferably at postgraduate level, in Information Technology, Business Information Systems, Business, Engineering, Mathematics or related disciplines.\u003c/p\u003e\u003cp\u003e•\tGood understanding of SAP implementation methodology.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tSenior Consultant will require a minimum of 6-8 years of experience in SAP Extended Warehouse Management (EWM) Module\u003c/strong\u003e, preferably with 4-6 end to end full life cycle \u003cstrong\u003eSAP EWM Module implementations with team leading experience.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tSAP S/4 HANA experience is an advantage\u003c/p\u003e\u003cp\u003e•\tDemonstrated success in multi-cultural work environment.\u003c/p\u003e\u003cp\u003e•\tSound understanding of business process, industry nuances and leading practic
